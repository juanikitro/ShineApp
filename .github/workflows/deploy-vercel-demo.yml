name: Deploy Vercel Demo

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: shineapp-demo-deploy
  cancel-in-progress: false

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"
  WEB_BASE_URL: https://shineapp-web.vercel.app
  API_BASE_URL: https://shineapp-api.vercel.app/api
  NEXT_PUBLIC_API_URL: https://shineapp-api.vercel.app/api
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

jobs:
  deploy-demo:
    name: Deploy demo
    runs-on: ubuntu-latest
    environment: demo-production
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required GitHub secrets
        shell: bash
        env:
          VERCEL_FRONTEND_PROJECT_ID: ${{ secrets.VERCEL_FRONTEND_PROJECT_ID }}
          VERCEL_BACKEND_PROJECT_ID: ${{ secrets.VERCEL_BACKEND_PROJECT_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DJANGO_MIGRATION_SECRET_KEY: ${{ secrets.DJANGO_MIGRATION_SECRET_KEY }}
        run: |
          set -euo pipefail
          missing=()

          for name in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_FRONTEND_PROJECT_ID VERCEL_BACKEND_PROJECT_ID DATABASE_URL DJANGO_MIGRATION_SECRET_KEY; do
            value="${!name:-}"
            if [ -z "$value" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required GitHub secrets: %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Run backend checks
        working-directory: backend
        run: |
          python -m pytest
          python manage.py check
          python manage.py makemigrations --check --dry-run

      - name: Run frontend checks
        working-directory: frontend
        run: |
          npm run test
          npm run build

      - name: Run Django migrations
        working-directory: backend
        env:
          DJANGO_SETTINGS_MODULE: config.settings_migrations
          DJANGO_MIGRATION_SECRET_KEY: ${{ secrets.DJANGO_MIGRATION_SECRET_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python manage.py migrate --plan
          python manage.py migrate --noinput

      - name: Install Vercel CLI
        run: |
          npm install --global vercel@latest
          vercel --version

      - name: Pull backend project settings from Vercel
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_BACKEND_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token "$VERCEL_TOKEN" --cwd backend

      - name: Deploy backend to Vercel production
        id: deploy_backend
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_BACKEND_PROJECT_ID }}
        run: |
          set -euo pipefail
          deployment_output="$(vercel deploy --prod --yes --token "$VERCEL_TOKEN" --cwd backend)"
          printf '%s\n' "$deployment_output"
          deployment_url="$(printf '%s\n' "$deployment_output" | tail -n 1)"
          echo "url=$deployment_url" >> "$GITHUB_OUTPUT"
          echo "BACKEND_DEPLOYMENT_URL=$deployment_url" >> "$GITHUB_ENV"
          echo "Backend deployment: $deployment_url"

      - name: Pull frontend project settings from Vercel
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_FRONTEND_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token "$VERCEL_TOKEN" --cwd frontend

      - name: Deploy frontend to Vercel production
        id: deploy_frontend
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_FRONTEND_PROJECT_ID }}
        run: |
          set -euo pipefail
          deployment_output="$(vercel deploy --prod --yes --token "$VERCEL_TOKEN" --cwd frontend)"
          printf '%s\n' "$deployment_output"
          deployment_url="$(printf '%s\n' "$deployment_output" | tail -n 1)"
          echo "url=$deployment_url" >> "$GITHUB_OUTPUT"
          echo "FRONTEND_DEPLOYMENT_URL=$deployment_url" >> "$GITHUB_ENV"
          echo "Frontend deployment: $deployment_url"

      - name: Smoke test public demo
        shell: pwsh
        run: ./scripts/deploy/smoke-test.ps1 -WebBaseUrl "$env:WEB_BASE_URL" -ApiBaseUrl "$env:API_BASE_URL"
