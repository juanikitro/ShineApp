name: Deploy Vercel Demo

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: shineapp-demo-deploy
  cancel-in-progress: false

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"
  DJANGO_SETTINGS_MODULE: config.settings_production
  WEB_BASE_URL: https://shineapp-web.vercel.app
  API_BASE_URL: https://shineapp-api.vercel.app/api
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

jobs:
  deploy-demo:
    name: Deploy demo
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required GitHub secrets
        shell: bash
        env:
          VERCEL_FRONTEND_PROJECT_ID: ${{ secrets.VERCEL_FRONTEND_PROJECT_ID }}
          VERCEL_BACKEND_PROJECT_ID: ${{ secrets.VERCEL_BACKEND_PROJECT_ID }}
        run: |
          set -euo pipefail
          missing=()

          for name in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_FRONTEND_PROJECT_ID VERCEL_BACKEND_PROJECT_ID; do
            value="${!name:-}"
            if [ -z "$value" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required GitHub secrets: %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Vercel CLI
        run: |
          npm install --global vercel@latest
          vercel --version

      - name: Pull backend project settings from Vercel
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_BACKEND_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token "$VERCEL_TOKEN" --cwd backend

      - name: Run backend production checks
        working-directory: backend
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_BACKEND_PROJECT_ID }}
        run: |
          vercel env run -e production --token "$VERCEL_TOKEN" -- python manage.py check --deploy
          vercel env run -e production --token "$VERCEL_TOKEN" -- python manage.py makemigrations --check --dry-run

      - name: Build backend Vercel artifact
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_BACKEND_PROJECT_ID }}
        run: vercel build --prod --token "$VERCEL_TOKEN" --cwd backend

      - name: Deploy backend to Vercel production
        id: deploy_backend
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_BACKEND_PROJECT_ID }}
        run: |
          set -euo pipefail
          deployment_url="$(vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN" --cwd backend)"
          echo "url=$deployment_url" >> "$GITHUB_OUTPUT"
          echo "BACKEND_DEPLOYMENT_URL=$deployment_url" >> "$GITHUB_ENV"
          echo "Backend deployment: $deployment_url"

      - name: Print Django migration plan
        working-directory: backend
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_BACKEND_PROJECT_ID }}
        run: vercel env run -e production --token "$VERCEL_TOKEN" -- python manage.py migrate --plan

      - name: Run Django migrations
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        working-directory: backend
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_BACKEND_PROJECT_ID }}
        run: vercel env run -e production --token "$VERCEL_TOKEN" -- python manage.py migrate --noinput

      - name: Pull frontend production env from Vercel
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_FRONTEND_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token "$VERCEL_TOKEN" --cwd frontend

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test

      - name: Build frontend Vercel artifact
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_FRONTEND_PROJECT_ID }}
        run: vercel build --prod --token "$VERCEL_TOKEN" --cwd frontend

      - name: Deploy frontend to Vercel production
        id: deploy_frontend
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_FRONTEND_PROJECT_ID }}
        run: |
          set -euo pipefail
          deployment_url="$(vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN" --cwd frontend)"
          echo "url=$deployment_url" >> "$GITHUB_OUTPUT"
          echo "FRONTEND_DEPLOYMENT_URL=$deployment_url" >> "$GITHUB_ENV"
          echo "Frontend deployment: $deployment_url"

      - name: Smoke test public demo
        shell: pwsh
        run: ./scripts/deploy/smoke-test.ps1 -WebBaseUrl "$env:WEB_BASE_URL" -ApiBaseUrl "$env:API_BASE_URL"
