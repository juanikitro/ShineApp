name: Deploy Vercel Demo

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: shineapp-demo-deploy
  cancel-in-progress: false

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"
  DJANGO_SETTINGS_MODULE: config.settings_production
  WEB_BASE_URL: https://shineapp-web.vercel.app
  API_BASE_URL: https://shineapp-api.vercel.app/api
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}

jobs:
  deploy-demo:
    name: Deploy demo
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required GitHub secrets
        shell: bash
        env:
          VERCEL_FRONTEND_PROJECT_ID: ${{ secrets.VERCEL_FRONTEND_PROJECT_ID }}
          VERCEL_BACKEND_PROJECT_ID: ${{ secrets.VERCEL_BACKEND_PROJECT_ID }}
        run: |
          set -euo pipefail
          missing=()

          for name in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_FRONTEND_PROJECT_ID VERCEL_BACKEND_PROJECT_ID; do
            value="${!name:-}"
            if [ -z "$value" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required GitHub secrets: %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Vercel CLI
        run: |
          npm install --global vercel@latest
          vercel --version

      - name: Pull backend production env from Vercel
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_BACKEND_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token "$VERCEL_TOKEN" --cwd backend

      - name: Export backend Vercel env for Django
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import ast
          import os
          import re
          import sys
          from pathlib import Path

          env_path = Path("backend/.vercel/.env.production.local")
          required = [
              "DJANGO_SETTINGS_MODULE",
              "DJANGO_SECRET_KEY",
              "DJANGO_ALLOWED_HOSTS",
              "CORS_ALLOWED_ORIGINS",
              "CSRF_TRUSTED_ORIGINS",
              "DATABASE_URL",
              "DATABASE_SSL_REQUIRE",
              "SUPABASE_STORAGE_ENABLED",
              "SUPABASE_STORAGE_BUCKET",
              "SUPABASE_S3_ENDPOINT_URL",
              "SUPABASE_S3_REGION_NAME",
              "SUPABASE_S3_ACCESS_KEY_ID",
              "SUPABASE_S3_SECRET_ACCESS_KEY",
              "SUPABASE_STORAGE_QUERYSTRING_AUTH",
              "SUPABASE_STORAGE_LOCATION",
          ]

          if not env_path.exists():
              sys.exit(f"Vercel env file not found: {env_path}")

          key_re = re.compile(r"^[A-Za-z_][A-Za-z0-9_]*$")
          values = {}
          for lineno, line in enumerate(env_path.read_text(encoding="utf-8").splitlines(), start=1):
              line = line.strip()
              if not line or line.startswith("#"):
                  continue
              if line.startswith("export "):
                  line = line[len("export ") :].strip()
              if "=" not in line:
                  sys.exit(f"Invalid dotenv line {lineno} in {env_path}")
              key, raw_value = line.split("=", 1)
              key = key.strip()
              if not key_re.match(key):
                  sys.exit(f"Invalid dotenv key {key!r} in {env_path}")
              raw_value = raw_value.strip()
              if raw_value[:1] in {"'", '"'}:
                  try:
                      value = ast.literal_eval(raw_value)
                  except (SyntaxError, ValueError) as exc:
                      sys.exit(f"Could not parse quoted dotenv value for {key}: {exc}")
              else:
                  value = raw_value
              values[key] = value

          missing = [key for key in required if not values.get(key)]
          if missing:
              sys.exit("Missing required backend Vercel env vars: " + ", ".join(missing))

          def command_escape(value):
              return value.replace("%", "%25").replace("\r", "%0D").replace("\n", "%0A")

          def write_github_env(handle, key, value):
              if "\n" not in value:
                  handle.write(f"{key}={value}\n")
                  return

              delimiter = f"SHINEAPP_{key}_EOF"
              while delimiter in value:
                  delimiter += "_END"
              handle.write(f"{key}<<{delimiter}\n{value}\n{delimiter}\n")

          def is_sensitive(key):
              sensitive_markers = ("SECRET", "TOKEN", "PASSWORD", "DATABASE_URL", "ACCESS_KEY", "PRIVATE_KEY")
              return any(marker in key for marker in sensitive_markers)

          github_env = os.environ["GITHUB_ENV"]
          with open(github_env, "a", encoding="utf-8") as handle:
              for key, value in values.items():
                  if value and is_sensitive(key):
                      print(f"::add-mask::{command_escape(value)}")
                  write_github_env(handle, key, value)

          print(f"Exported {len(values)} backend Vercel environment variables for Django.")
          PY

      - name: Run backend production checks
        run: |
          python backend/manage.py check --deploy
          python backend/manage.py makemigrations --check --dry-run

      - name: Build backend Vercel artifact
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_BACKEND_PROJECT_ID }}
        run: vercel build --prod --token "$VERCEL_TOKEN" --cwd backend

      - name: Deploy backend to Vercel production
        id: deploy_backend
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_BACKEND_PROJECT_ID }}
        run: |
          set -euo pipefail
          deployment_url="$(vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN" --cwd backend)"
          echo "url=$deployment_url" >> "$GITHUB_OUTPUT"
          echo "BACKEND_DEPLOYMENT_URL=$deployment_url" >> "$GITHUB_ENV"
          echo "Backend deployment: $deployment_url"

      - name: Print Django migration plan
        run: python backend/manage.py migrate --plan

      - name: Run Django migrations
        if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
        run: python backend/manage.py migrate --noinput

      - name: Pull frontend production env from Vercel
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_FRONTEND_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token "$VERCEL_TOKEN" --cwd frontend

      - name: Run frontend tests
        working-directory: frontend
        run: npm run test

      - name: Build frontend Vercel artifact
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_FRONTEND_PROJECT_ID }}
        run: vercel build --prod --token "$VERCEL_TOKEN" --cwd frontend

      - name: Deploy frontend to Vercel production
        id: deploy_frontend
        env:
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_FRONTEND_PROJECT_ID }}
        run: |
          set -euo pipefail
          deployment_url="$(vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN" --cwd frontend)"
          echo "url=$deployment_url" >> "$GITHUB_OUTPUT"
          echo "FRONTEND_DEPLOYMENT_URL=$deployment_url" >> "$GITHUB_ENV"
          echo "Frontend deployment: $deployment_url"

      - name: Smoke test public demo
        shell: pwsh
        run: ./scripts/deploy/smoke-test.ps1 -WebBaseUrl "$env:WEB_BASE_URL" -ApiBaseUrl "$env:API_BASE_URL"
