name: Validate

on:
  pull_request:
    branches:
      - main
  merge_group:
  push:
    branches:
      - main
      - development

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "22"

jobs:
  backend:
    name: backend
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements.txt

      - name: Django system check
        working-directory: backend
        run: python manage.py check

      - name: Migration drift check
        working-directory: backend
        run: python manage.py makemigrations --check --dry-run

      - name: Backend tests with coverage gate
        working-directory: backend
        run: python -m pytest --cov --cov-report=term-missing:skip-covered

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend tests with coverage gate
        working-directory: frontend
        run: npm run test:coverage

      - name: Frontend build
        working-directory: frontend
        run: npm run build

      - name: Frontend production dependency audit
        working-directory: frontend
        run: npm audit --omit=dev

  dependency-audit:
    name: dependency-audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Audit Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit==2.10.0
          pip-audit -r backend/requirements.txt

  docs:
    name: docs
    # Solo se verifica en push a main/development: en feature branches los archivos
    # generados (CHANGELOG.md, indices) no se commitean, por lo que siempre
    # estarian "desactualizados" respecto al fragmento recien agregado.
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-docs.txt

      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-docs.txt

      - name: Check docs drift
        run: python scripts/check_docs.py --check

      - name: MkDocs strict build
        run: python -m mkdocs build --strict

  ci-required:
    name: ci-required
    runs-on: ubuntu-latest
    needs:
      - backend
      - frontend
      - dependency-audit
      - docs
    if: always()

    steps:
      - name: Verify required checks
        env:
          BACKEND_RESULT: ${{ needs.backend.result }}
          FRONTEND_RESULT: ${{ needs.frontend.result }}
          DEPENDENCY_AUDIT_RESULT: ${{ needs.dependency-audit.result }}
          DOCS_RESULT: ${{ needs.docs.result }}
        run: |
          set -euo pipefail

          printf 'backend=%s\n' "$BACKEND_RESULT"
          printf 'frontend=%s\n' "$FRONTEND_RESULT"
          printf 'dependency-audit=%s\n' "$DEPENDENCY_AUDIT_RESULT"
          printf 'docs=%s\n' "$DOCS_RESULT"

          failed=0
          for result in "$BACKEND_RESULT" "$FRONTEND_RESULT" "$DEPENDENCY_AUDIT_RESULT"; do
            if [ "$result" != "success" ]; then
              failed=1
            fi
          done
          # docs solo corre en push; en PRs queda "skipped", lo cual es valido.
          if [ "$DOCS_RESULT" != "success" ] && [ "$DOCS_RESULT" != "skipped" ]; then
            failed=1
          fi

          if [ "$failed" -ne 0 ]; then
            echo "One or more required CI jobs failed, were cancelled, or were skipped." >&2
            exit 1
          fi
